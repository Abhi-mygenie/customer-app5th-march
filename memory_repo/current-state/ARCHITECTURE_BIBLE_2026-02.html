  // STEP 1: extract mermaid blocks BEFORE marked runs (so <br/> etc are preserved verbatim)
  const mermaidBlocks = [];
  const preprocessed = md.replace(/```mermaid\n([\s\S]*?)```/g, (_, code) => {
    const idx = mermaidBlocks.length;
    mermaidBlocks.push(code);
    return `\n\n<!--MERMAID_PLACEHOLDER_${idx}-->\n\n`;
  });

  // STEP 2: run marked normally
  marked.setOptions({ gfm: true, breaks: false, headerIds: true, mangle: false });
  let renderedHtml = marked.parse(preprocessed);

  // STEP 3: swap placeholders for real <div class="mermaid"> containers (source stored as data-src)
  renderedHtml = renderedHtml.replace(/<!--MERMAID_PLACEHOLDER_(\d+)-->/g, (_, i) => {
    const src = mermaidBlocks[parseInt(i, 10)];
    // Escape for HTML attribute
    const escaped = src.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    return `<div class="mermaid" data-src="${escaped}"></div>`;
  });

  document.getElementById('content').innerHTML = renderedHtml;

  // STEP 4: put the source text into each mermaid div's textContent so mermaid.run() picks it up
  document.querySelectorAll('.mermaid').forEach(el => {
    const src = el.getAttribute('data-src');
    if (src) el.textContent = src;
  });

  // STEP 5: init and run mermaid
  mermaid.initialize({
    startOnLoad: false, theme: 'default', securityLevel: 'loose',
    themeVariables: { fontFamily: 'Inter, -apple-system, sans-serif', fontSize: '14px' },
    sequence: { showSequenceNumbers: false, wrap: true, actorMargin: 60, boxMargin: 8, messageMargin: 30 },
    flowchart: { htmlLabels: true, curve: 'basis', diagramPadding: 12 }
  });
  mermaid.run({ nodes: document.querySelectorAll('.mermaid') });

  // STEP 6: TOC
  const tocList = document.getElementById('toc-list');
  document.querySelectorAll('#content h2, #content h3').forEach(h => {
    if (!h.id) h.id = h.textContent.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    const li = document.createElement('li');
    if (h.tagName === 'H3') li.style.paddingLeft = '12px';
    const a = document.createElement('a'); a.href = '#' + h.id; a.textContent = h.textContent;
    li.appendChild(a); tocList.appendChild(li);
  });

  // STEP 7: highlight normal code blocks
  document.querySelectorAll('pre code').forEach(el => {
    if (window.hljs) { try { hljs.highlightElement(el); } catch(e) {} }
  });
</script>
